name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Go release binaries
        run: bash scripts/build-assets.sh "$VERSION"

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Package frontend and migrations archives
        run: |
          tar -czf release/frontend-dist.tar.gz -C frontend/dist .
          tar -czf release/migrations.tar.gz -C migrations .

      - name: Assemble per-architecture release bundles
        run: |
          for ARCH in linux_amd64 linux_arm64; do
            BUNDLE="$(mktemp -d)"
            cp servika-install.sh "$BUNDLE/"
            mkdir -p "$BUNDLE/assets/$ARCH"
            cp "release/$ARCH/servika-server" "release/$ARCH/servika-seed-admin" "$BUNDLE/assets/$ARCH/"
            cp release/frontend-dist.tar.gz release/migrations.tar.gz "$BUNDLE/assets/"
            cp -r assets/ops assets/nginx assets/php-fpm assets/phpmyadmin assets/systemd assets/mail "$BUNDLE/assets/"
            tar -czf "release/servika-${VERSION}-${ARCH}.tar.gz" -C "$BUNDLE" .
            rm -rf "$BUNDLE"
          done

      - name: Extract release notes from CHANGELOG
        run: |
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 {p=1; print; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > release/RELEASE_NOTES.md
          if [ ! -s release/RELEASE_NOTES.md ]; then
            echo "no CHANGELOG section for $VERSION; falling back to auto-generated notes" >&2
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s release/RELEASE_NOTES.md ]; then
            NOTES_ARG=(--notes-file release/RELEASE_NOTES.md)
          else
            NOTES_ARG=(--generate-notes)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Servika $VERSION" \
            "${NOTES_ARG[@]}" \
            "release/servika-${VERSION}-linux_amd64.tar.gz" \
            "release/servika-${VERSION}-linux_arm64.tar.gz"
