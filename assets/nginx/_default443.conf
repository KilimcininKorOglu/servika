# Port 443 catch-all for unmatched SNI and Host headers.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/servika/panel.crt;
    ssl_certificate_key /etc/ssl/servika/panel.key;

    root /var/www/_default80;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    access_log /var/log/nginx/default443.access.log;
    error_log  /var/log/nginx/default443.error.log warn;
}
