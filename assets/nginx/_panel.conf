# SERVIKA-LOGIN-RATELIMIT v1
# Login endpoint defense at the nginx layer. The application also enforces
# a per-IP failed-login lockout in middleware.LoginRateLimit.
limit_req_zone $binary_remote_addr zone=servika_login:10m rate=20r/m;

# Panel administration interface on port 8443
server {
    listen 8443 ssl default_server;
    ssl_certificate /etc/ssl/servika/panel.crt;
    ssl_certificate_key /etc/ssl/servika/panel.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    http2 on;
    error_page 497 =301 https://$host:$server_port$request_uri;
    listen [::]:8443 ssl default_server;
    server_name _;

    # SERVIKA-PANEL-SEC v2
    # Server-level headers inherited by the SPA and phpMyAdmin PHP responses.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10240m;
    client_body_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_request_buffering off;

    root /opt/servika/frontend-dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # This location defines add_header, so repeat inherited security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location = /api/v1/auth/login {
        limit_req zone=servika_login burst=8 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location = /api/v1/customer/login {
        limit_req zone=servika_login burst=8 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        # This location defines add_header, so repeat inherited security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    access_log /var/log/nginx/panel.access.log;
    error_log  /var/log/nginx/panel.error.log warn;

# phpMyAdmin and signon endpoint within the panel's port 8443 virtual host
# This section is included at the end of _panel.conf.

location = /pma-signon.php {
    root /opt/servika/pma-signon;
    fastcgi_pass unix:/run/php-fpm/phpmyadmin.sock;
    fastcgi_param SCRIPT_FILENAME /opt/servika/pma-signon/pma-signon.php;
    include fastcgi_params;
}

location ^~ /pma/ {
    alias /opt/phpmyadmin/;
    index index.php;

    location ~ ^/pma/(.+\.php)$ {
        alias /opt/phpmyadmin/$1;
        fastcgi_pass unix:/run/php-fpm/phpmyadmin.sock;
        fastcgi_param SCRIPT_FILENAME /opt/phpmyadmin/$1;
        fastcgi_param SCRIPT_NAME /pma/$1;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ ^/pma/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt|svg|woff2?|map))$ {
        alias /opt/phpmyadmin/$1;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # This location defines add_header, so repeat inherited security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# Roundcube webmail within the panel's port 8443 virtual host.
# Users sign in with their mailbox address and password. SSO is intentionally not used.
location ^~ /webmail/ {
    alias /opt/roundcube/;
    index index.php;

    location ~ ^/webmail/(config|temp|logs|SQL|bin|tests)/ {
        deny all;
        return 404;
    }

    location ~ ^/webmail/(.+\.php)$ {
        alias /opt/roundcube/$1;
        fastcgi_pass unix:/run/php-fpm/roundcube.sock;
        fastcgi_param SCRIPT_FILENAME /opt/roundcube/$1;
        fastcgi_param SCRIPT_NAME /webmail/$1;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ ^/webmail/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt|svg|woff2?|map))$ {
        alias /opt/roundcube/$1;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # This location defines add_header, so repeat inherited security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

}
